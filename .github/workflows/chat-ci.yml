name: Chat Mini App CI

on:
  push:
    paths:
      - 'chat/**'
      - '.github/workflows/chat-ci.yml'
  pull_request:
    paths:
      - 'chat/**'
      - '.github/workflows/chat-ci.yml'

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chat/package-lock.json
      - run: npm ci
      - run: npm run test:run
      - run: npm run typecheck
      - run: npm run build
      - run: npm run verify:workers
      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
